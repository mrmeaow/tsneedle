name: CI

on:
  push:
    branches: [main, next, dev]
  pull_request:
    branches: [main, next, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:coverage

      - name: Check exports
        run: pnpm check:exports

  runtime-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test ESM
        run: node --input-type=module -e "import('./dist/index.js').then(m => console.log('ESM OK'))"

      - name: Test CJS
        run: node --input-type=commonjs -e "require('./dist/index.cjs')" && echo "CJS OK"

  release-dev:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Bump version and create release
        id: release
        run: |
          # Create config inline to avoid fetching from main branch
          cat > release-please-config.dev.json <<'EOF'
          {
            "release-type": "node",
            "packages": {
              ".": {
                "package-name": "@mrmeaow/tsinject",
                "changelog-path": "CHANGELOG.md",
                "prerelease": true,
                "prerelease-type": "dev",
                "versioning": "prerelease"
              }
            },
            "changelog-path": "CHANGELOG.md",
            "include-component-in-tag": false,
            "includeVInTag": true,
            "prerelease": true,
            "bump-minor-pre-major": true,
            "bump-patch-for-minor-pre-major": true
          }
          EOF

          # Run release-please to bump version and create release
          # It will update package.json, CHANGELOG.md, and manifest
          npx release-please github-release \
            --token=${{ secrets.GITHUB_TOKEN }} \
            --repo-url=${{ github.server_url }}/${{ github.repository }} \
            --config-file=release-please-config.dev.json \
            --manifest-file=.release-please-manifest.json 2>&1 || true

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (dev)
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $CURRENT_VERSION"
          
          # Check if version already exists on npm
          if npm view @mrmeaow/tsinject@$CURRENT_VERSION version &>/dev/null; then
            echo "Version $CURRENT_VERSION already published, skipping"
          else
            npm publish --tag dev --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR (dev)
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing to JSR version: $CURRENT_VERSION"
          npx jsr publish --allow-dirty

  release-next:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/next'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Bump version and create release
        id: release
        run: |
          cat > release-please-config.next.json <<'EOF'
          {
            "release-type": "node",
            "packages": {
              ".": {
                "package-name": "@mrmeaow/tsinject",
                "changelog-path": "CHANGELOG.md",
                "prerelease": true,
                "prerelease-type": "next",
                "versioning": "prerelease"
              }
            },
            "changelog-path": "CHANGELOG.md",
            "include-component-in-tag": false,
            "includeVInTag": true,
            "prerelease": true,
            "bump-minor-pre-major": true,
            "bump-patch-for-minor-pre-major": true
          }
          EOF

          npx release-please github-release \
            --token=${{ secrets.GITHUB_TOKEN }} \
            --repo-url=${{ github.server_url }}/${{ github.repository }} \
            --config-file=release-please-config.next.json \
            --manifest-file=.release-please-manifest.json 2>&1 || true

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (next)
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $CURRENT_VERSION"
          
          if npm view @mrmeaow/tsinject@$CURRENT_VERSION version &>/dev/null; then
            echo "Version $CURRENT_VERSION already published, skipping"
          else
            npm publish --tag next --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR (next)
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing to JSR version: $CURRENT_VERSION"
          npx jsr publish --allow-dirty

  release-stable:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if version exists on npm
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          if npm view @mrmeaow/tsinject@$CURRENT_VERSION version &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm (stable)
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "Publishing @mrmeaow/tsinject@${{ steps.check.outputs.version }} to npm"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR (stable)
        run: |
          echo "Publishing @mrmeaow/tsinject@${{ steps.check.outputs.version }} to JSR"
          npx jsr publish --allow-dirty
