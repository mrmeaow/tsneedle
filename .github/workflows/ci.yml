name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:coverage
        id: test

      - name: Generate coverage badge
        id: generate-badge
        run: |
          # Parse coverage from JSON report
          COVERAGE=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
            
            // Calculate total lines and covered lines
            let totalLines = 0;
            let coveredLines = 0;
            
            for (const [file, coverage] of Object.entries(data)) {
              if (coverage.f) {
                // Count function coverage as proxy for line coverage
                for (const [fn, count] of Object.entries(coverage.f)) {
                  if (count > 0) coveredLines++;
                }
              }
              if (coverage.s) {
                for (const [stmt, count] of Object.entries(coverage.s)) {
                  totalLines++;
                  if (count > 0) coveredLines++;
                }
              }
            }
            
            const percent = totalLines > 0 ? (coveredLines / totalLines * 100).toFixed(2) : 0;
            console.log(percent);
          ")
          
          # Round to integer
          COVERAGE_INT=$(printf "%.0f" "$COVERAGE")
          
          # Determine color based on coverage percentage
          if (( COVERAGE_INT >= 90 )); then
            COLOR="brightgreen"
          elif (( COVERAGE_INT >= 75 )); then
            COLOR="green"
          elif (( COVERAGE_INT >= 50 )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          
          echo "Coverage: ${COVERAGE_INT}%"
          echo "coverage=$COVERAGE_INT" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          
          # Generate dynamic badge URL for README
          BADGE_URL="https://img.shields.io/badge/coverage-${COVERAGE_INT}%25-${COLOR}"
          echo "badge_url=$BADGE_URL" >> $GITHUB_OUTPUT
          echo "::notice::Coverage badge: $BADGE_URL"

      - name: Commit coverage badge update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          COVERAGE="${{ steps.generate-badge.outputs.coverage }}"
          COLOR="${{ steps.generate-badge.outputs.color }}"
          
          # Update README badge
          sed -i "s|coverage-[0-9]*%25-[a-z]*|coverage-${COVERAGE}%25-${COLOR}|g" README.md
          
          # Commit the change
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update coverage badge to ${COVERAGE}%"

      - name: Check exports
        run: pnpm check:exports

  runtime-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test ESM
        run: node --input-type=module -e "import('./dist/index.js').then(m => console.log('ESM OK'))"

      - name: Test CJS
        run: node --input-type=commonjs -e "require('./dist/index.cjs')" && echo "CJS OK"

  release-stable:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if version exists on npm
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          if npm view @mrmeaow/tsinject@$CURRENT_VERSION version &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm (stable)
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "Publishing @mrmeaow/tsinject@${{ steps.check.outputs.version }} to npm"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR (stable)
        run: |
          echo "Publishing @mrmeaow/tsinject@${{ steps.check.outputs.version }} to JSR"
          npx jsr publish --allow-dirty
